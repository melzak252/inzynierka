services:
  timescaledb:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: ensemblelegends-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-betting}
      POSTGRES_USER: ${POSTGRES_USER:-betting}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-betting_local_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./docker/timescale/init.sql:/docker-entrypoint-initdb.d/001_timescale.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-betting} -d ${POSTGRES_DB:-betting}"]
      interval: 10s
      timeout: 5s
      retries: 5

  betting-scheduler:
    image: ensemblelegends-betting:latest
    build:
      context: .
      dockerfile: Dockerfile.betting
    container_name: ensemblelegends-betting-scheduler
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      BETTING_APP_DB: /app/data/betting_app.sqlite3
      BETTING_APP_DEBUG_DIR: /app/data/betting_scraper_debug
      BETTING_APP_TAX_RATE: "${BETTING_APP_TAX_RATE:-0.12}"
      BETTING_APP_MIN_EV: "${BETTING_APP_MIN_EV:-0.05}"
      BETTING_APP_BANKROLL: "${BETTING_APP_BANKROLL:-100.0}"
      BETTING_APP_HEADLESS: "1"
      PYTHONPATH: /app
      DATABASE_URL: "${DATABASE_URL:-postgresql+psycopg2://${POSTGRES_USER:-betting}:${POSTGRES_PASSWORD:-betting_local_password}@timescaledb:5432/${POSTGRES_DB:-betting}}"
    volumes:
      - ./data:/app/data
    command: >
      python -m betting_app.scheduler

  betting-api:
    image: ensemblelegends-betting:latest
    build:
      context: .
      dockerfile: Dockerfile.betting
    container_name: ensemblelegends-betting-api
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
    ports:
      - "${BETTING_API_PORT:-8000}:8000"
    environment:
      BETTING_APP_DB: /app/data/betting_app.sqlite3
      BETTING_APP_TAX_RATE: "${BETTING_APP_TAX_RATE:-0.12}"
      BETTING_APP_MIN_EV: "${BETTING_APP_MIN_EV:-0.05}"
      PYTHONPATH: /app
      DATABASE_URL: "${DATABASE_URL:-postgresql+psycopg2://${POSTGRES_USER:-betting}:${POSTGRES_PASSWORD:-betting_local_password}@timescaledb:5432/${POSTGRES_DB:-betting}}"
    volumes:
      - ./data:/app/data
    command: >
      uvicorn betting_app.api.main:app
      --host 0.0.0.0
      --port 8000

  client:
    build: ./client
    container_name: ensemblelegends-client
    restart: unless-stopped
    depends_on:
      - betting-api
    ports:
      - "${CLIENT_PORT:-3000}:3000"
    environment:
      VITE_API_PROXY_TARGET: "http://192.168.1.17:8000"

volumes:
  timescale-data:
