services:
  postgres:
    image: postgres:16-alpine
    container_name: ensemblelegends-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ensemblelegends}
      POSTGRES_USER: ${POSTGRES_USER:-ensemblelegends}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ensemblelegends_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ensemblelegends

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ensemblelegends-server
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-EnsembleLegends API}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-ensemblelegends}:${POSTGRES_PASSWORD:-ensemblelegends_dev_password}@postgres:5432/${POSTGRES_DB:-ensemblelegends}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
    ports:
      - "${SERVER_PORT:-8000}:8000"
    volumes:
      - ./server/app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ensemblelegends

volumes:
  postgres_data:

networks:
  ensemblelegends:
    driver: bridge
